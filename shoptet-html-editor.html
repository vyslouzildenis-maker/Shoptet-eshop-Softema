<!-- ============================================================
     SOFTEMA — nasazení do Shoptetu (spolehlivá varianta)
     ------------------------------------------------------------
     Editor HTML kódu:
       • ZÁHLAVÍ (před </head>)  = NECH PRÁZDNÉ
       • ZÁPATÍ  (před </body>)  = vlož POUZE blok níže
     Proč: pole Záhlaví v editoru ukusuje „<" u <link>. Tenhle
     loader načte fonty i CSS z JS, takže žádné <link> v Záhlaví
     není potřeba a nic se nerozbije.
     ============================================================ -->
<script>
(function () {
  var base = "https://cdn.jsdelivr.net/gh/vyslouzildenis-maker/Shoptet-eshop-Softema@main/";
  function css(href){ var l=document.createElement("link"); l.rel="stylesheet"; l.href=href; document.head.appendChild(l); }
  css("https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Figtree:wght@400;500;600;700&display=swap");
  css(base + "custom.css");
  var s = document.createElement("script");
  s.defer = true;
  s.src = base + "custom.js";
  document.body.appendChild(s);
})();
</script>
